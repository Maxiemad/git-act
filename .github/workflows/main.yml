name: my_first_ci
on:
  pull_request:
  push:
    branches: [main]
jobs:
  ci_job:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Load Virtual Machine
        uses: actions/checkout@v4
      
      - name: Setup Node env
        uses: actions/setup-node@v4
      
      - name: Install Dependency
        run: npm install
      
      - name: Run index File
        run: node index.js
      
      
